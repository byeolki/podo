services:
  podo:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DB_PATH: /data/podo.db
      UPLOAD_DIR: /data/uploads
      ARTWORK_DIR: /data/artwork
      TRANSCODE_CACHE_DIR: /data/transcode-cache
      STATIC_DIR: /app/public
      MIGRATIONS_PATH: /app/dist/db/migrations
      PORT: 3000
      HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      LIBRARY_ROOTS: ${LIBRARY_ROOTS:-/music}
      MUSICBRAINZ_USER_AGENT: ${MUSICBRAINZ_USER_AGENT:-podo/0.1.0}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
    volumes:
      - podo-data:/data
      - ${MUSIC_DIR:-./music}:/music:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  podo-data:
